airflow:
  base_url: 'http://localhost:28080'
  timeout: '30s'
  auth:
    type: basic
    username: 'airflow'
    password: 'airflow'

ui:
  theme: dark
  refresh_intervals:
    dags: '5s'
    runs: '3s'
    tasks: '2s'
    logs: '1s'
    health: '10s'
  # Lookback window for cluster KPI bar + per-DAG run counts.
  # Go duration (max unit 'h'); 7 days = 168h, 14 days = 336h.
  rollup_window: '168h'
  # How the run drill-in is mounted: 'fullscreen' (overlay) or 'embedded'
  # (inside the bottom tab area, SPA-style).
  execution_layout: 'embedded'
